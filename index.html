<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Macondo+Swash+Caps&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="src/style.css">
    <title>Weather App</title>
</head>
<body>
    <div class = "weather-app">
    <header><form class ="search-form">
        <input type="search" placeholder="Enter city name" required class="search-form-input"/>
        <input type="submit" value="Search" class = "search-form-btn"/>
    </form>
    </header>
    <main> 
        <div class = "weather-app-data">
            <div>
            <h1 class = "weather-app-city" id = "city">Johannesburg</h1>
            <p class = "weather-app-details">Tuesday 14:40, scattered clouds
            <br/>
            Humidity: <strong>80%</strong>, Wind: <strong>1.3 km/h</strong></p></div>
            <div class = "weather-app-temperature-container">
           
                <div class = "weather-app-icon">
           🌧️ </div><div class ="weather-app-temperature">12 </div> 
           <div class = "weather-app-unit">°C</div>
            </div>
        </div>
        
    </main>
    
    <footer>Coded by <a href="https://github.com/Khanyi-Codes" target="_blank">Khanyisile Makhubu</a> 
    code  <a href="https://github.com/Khanyi-Codes/WeatherApp" target="_blank">opensourced on Github</a> 
    and website hosted on <a href="https://weatherappkhans.netlify.app/" target="_blank">Netlify</a></footer>
    </div>

<script src="src/index.js"></script>
</body>
</html
